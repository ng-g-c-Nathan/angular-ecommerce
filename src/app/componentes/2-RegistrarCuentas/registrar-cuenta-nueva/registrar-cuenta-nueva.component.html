<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card card-small">

    <div class="card-header">Agregar Cuenta</div>

    <div class="card-body">
      <form [formGroup]="formularioDeCliente" (ngSubmit)="submit()">

        <!-- Email -->
        <div class="mb-3">
          <label class="form-label">Correo Electrónico</label>
          <input
            type="email"
            class="form-control form-control-sm"
            [class.is-invalid]="emailInvalido"
            placeholder="Escribe tu correo electrónico"
            formControlName="Email"
          />
          <div class="invalid-feedback">
            <ng-container *ngIf="emailCtrl.hasError('required')">El correo es obligatorio.</ng-container>
            <ng-container *ngIf="emailCtrl.hasError('email')">Ingresa un correo válido.</ng-container>
            <ng-container *ngIf="emailCtrl.hasError('maxlength')">El correo no puede exceder 254 caracteres.</ng-container>
          </div>
        </div>

        <!-- Contraseña -->
        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <div class="input-group">
            <input
              [type]="mostrarPass1 ? 'text' : 'password'"
              class="form-control form-control-sm"
              [class.is-invalid]="pass1Invalida"
              placeholder="Escribe tu contraseña"
              formControlName="pass1"
            />
            <button type="button" class="btn btn-outline-secondary btn-sm" (click)="togglePass1()" tabindex="-1">
              <lucide-icon [img]="mostrarPass1 ? EyeOff : Eye" size="16" />
            </button>
            <div class="invalid-feedback">
              <ng-container *ngIf="pass1Ctrl.hasError('required')">La contraseña es obligatoria.</ng-container>
              <ng-container *ngIf="pass1Ctrl.hasError('minlength')">Mínimo 8 caracteres.</ng-container>
              <ng-container *ngIf="pass1Ctrl.hasError('maxlength')">Máximo 20 caracteres.</ng-container>
            </div>
          </div>
        </div>

        <!-- Confirmar contraseña -->
        <div class="mb-3">
          <label class="form-label">Vuelve a escribir la contraseña</label>
          <div class="input-group">
            <input
              [type]="mostrarPass2 ? 'text' : 'password'"
              class="form-control form-control-sm"
              [class.is-invalid]="pass2Invalida"
              placeholder="Reescribe tu contraseña"
              formControlName="pass2"
            />
            <button type="button" class="btn btn-outline-secondary btn-sm" (click)="togglePass2()" tabindex="-1">
              <lucide-icon [img]="mostrarPass2 ? EyeOff : Eye" size="16" />
            </button>
            <div class="invalid-feedback">
              <ng-container *ngIf="pass2Ctrl.hasError('required')">Confirma tu contraseña.</ng-container>
              <ng-container *ngIf="formularioDeCliente.hasError('noCoinciden') && !pass2Ctrl.hasError('required')">
                Las contraseñas no coinciden.
              </ng-container>
            </div>
          </div>
        </div>

        <!-- TOS -->
        <div class="form-check mb-3">
          <input
            class="form-check-input"
            type="checkbox"
            [checked]="aceptoTOS"
            (click)="toggleCheckbox()"
            id="checkboxTOS"
          />
          <label class="form-check-label" for="checkboxTOS">
            Acepto los
            <a (click)="abrirTerminos()" class="text-primary" style="cursor:pointer;">
              "Términos y Condiciones"
            </a>
          </label>
        </div>

        <!-- Modal Términos -->
        <div *ngIf="modalTerminosAbierto" class="cuadrito-overlay">
          <div class="cuadrito-content">
            <span class="close" (click)="cerrarTerminos()" style="cursor:pointer;">&times;</span>
            <h4>Términos y Condiciones</h4>
            <p style="white-space: pre-line;">{{ terminosYCondiciones }}</p>
          </div>
        </div>

        <!-- Botón Registrar -->
        <div class="btn-group d-flex mb-2" role="group">
          <button
            type="submit"
            class="btn btn-success btn-lg w-100"
            [disabled]="cargando"
          >
            <span *ngIf="cargando" class="spinner-border spinner-border-sm me-2" role="status"></span>
            {{ cargando ? 'Creando cuenta...' : 'Agregar' }}
          </button>
        </div>

        <!-- Ya tengo cuenta -->
        <div class="btn-group d-flex" role="group">
          <button
            type="button"
            class="btn btn-primary btn-lg w-100"
            (click)="irALogin()"
            [disabled]="cargando"
          >
            Ya tengo una cuenta
          </button>
        </div>

      </form>
    </div>

  </div>
</div>
